<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Booking Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Book Your Travels</h1>
        <nav>
            <ul>
                <li><a href="#flights">Flights</a></li>
                <li><a href="#hotels">Hotels</a></li>
                <li><a href="#cars">Car Rentals</a></li>
                <li><a href="#login">Login</a></li>
            </ul>
        </nav>
    </header>

    <section id="flights">
        <h2>Flight Search</h2>
        <form>
            <input type="text" placeholder="From" required>
            <input type="text" placeholder="To" required>
            <input type="date" required>
            <input type="date" required>
            <button type="submit">Search Flights</button>
        </form>
    </section>

    <section id="hotels">
        <h2>Hotel Booking</h2>
        <form>
            <input type="text" placeholder="Destination" required>
            <input type="date" required>
            <input type="date" required>
            <button type="submit">Book Now</button>
        </form>
    </section>

    <section id="cars">
        <h2>Car Rentals</h2>
        <form>
            <input type="text" placeholder="Pick-up Location" required>
            <input type="date" required>
            <input type="date" required>
            <button type="submit">Rent a Car</button>
        </form>
    </section>

    <section id="login">
        <h2>User Authentication</h2>
        <form>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Travel Booking Site</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
